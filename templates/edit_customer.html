{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                <div class="card-body p-4">
                    <h4 class="fw-bold text-primary mb-4 text-center">গ্রাহক তথ্য ও নতুন পণ্য সংযোজন</h4>
                    
                    <form action="/update_customer/{{ c._id|string }}" method="POST">
                        <input type="hidden" name="sheet_id" value="{{ c.sheet_id }}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="small fw-bold">গ্রাহকের নাম</label>
                                <input type="text" name="name" value="{{ c.customer_name }}" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="small fw-bold">হিসাব নম্বর</label>
                                <input type="text" name="acc_no" value="{{ c.acc_no }}" class="form-control" required>
                            </div>
                        </div>

                        <div class="p-3 bg-light rounded-3 mt-4 border">
                            <h6 class="fw-bold text-success mb-3"><i class="fas fa-plus-circle me-1"></i> নতুন পণ্য যোগ করুন</h6>
                            <div class="row g-2">
                                <div class="col-12">
                                    <input type="text" name="new_product" class="form-control" placeholder="পণ্যের নাম (খালি রাখলে শুধু নাম আপডেট হবে)">
                                </div>
                                <div class="col-md-4">
                                    <input type="number" step="any" name="new_price" class="form-control" placeholder="মূল্য">
                                </div>
                                <div class="col-md-4">
                                    <input type="number" step="any" name="new_profit" class="form-control" placeholder="সার্ভিস চার্জ">
                                </div>
                                <div class="col-md-4">
                                    <input type="number" step="any" name="new_per_kisti" class="form-control" placeholder="কিস্তি">
                                </div>
                                <div class="col-12 mt-2">
                                    <label class="x-small text-muted">বিতরণের তারিখ</label>
                                    <input type="date" name="new_date" class="form-control">
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <a href="/manage_customers_page" class="btn btn-light w-50 py-2 fw-bold">ফিরে যান</a>
                            <button type="submit" class="btn btn-primary w-50 py-2 fw-bold shadow-sm">সেভ করুন</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
