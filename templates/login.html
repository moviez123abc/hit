{% extends 'base.html' %}
{% block content %}
<div class="container d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-0" style="width: 100%; max-width: 400px; border-radius: 20px;">
        <div class="card-header bg-primary text-white text-center py-4" style="border-radius: 20px 20px 0 0;">
            <i class="fas fa-user-shield fa-3x mb-3"></i>
            <h4 class="mb-0">লগইন করুন</h4>
            <small class="opacity-75">সিস্টেম ব্যবহারের জন্য প্রবেশ করুন</small>
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">ইউজারনেম</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-user"></i></span>
                        <input type="text" name="username" class="form-control bg-light border-0" placeholder="ইউজারনেম দিন" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">পাসওয়ার্ড</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-lock"></i></span>
                        <input type="password" name="password" class="form-control bg-light border-0" placeholder="পাসওয়ার্ড দিন" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow" style="border-radius: 10px;">
                    প্রবেশ করুন <i class="fas fa-sign-in-alt ms-2"></i>
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
