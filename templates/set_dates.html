{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-lg border-0 mx-auto" style="max-width: 450px; border-radius: 20px;">
        <div class="card-header bg-primary text-white text-center py-3" style="border-radius: 20px 20px 0 0;">
            <h5 class="mb-0">শীটের তথ্য আপডেট করুন</h5>
            <small class="opacity-75">দলের নাম: {{ sheet.group_name }}</small>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                
                {# মাস আপডেট করার ফিল্ড #}
                <div class="mb-4 p-3 bg-light" style="border-radius: 15px; border-left: 5px solid #007bff;">
                    <label class="form-label fw-bold text-primary">বর্তমান মাস</label>
                    <input type="text" name="month" class="form-control rounded-pill shadow-sm border-primary" 
                           placeholder="উদাঃ জানুয়ারি" 
                           value="{{ sheet.month or '' }}" required>
                    <small class="text-muted ps-2">প্রিন্ট কপিতে এই মাসটি প্রদর্শিত হবে।</small>
                </div>

                <hr class="my-4 text-muted opacity-25">
                <h6 class="mb-3 fw-bold text-muted ps-2">কালেকশন তারিখসমূহ:</h6>

                {% for i in range(1, 6) %}
                <div class="mb-3">
                    <label class="form-label fw-bold small text-muted">কিস্তি-{{ i }} এর তারিখ</label>
                    <input type="text" name="date{{ i }}" class="form-control rounded-pill shadow-sm" 
                           placeholder="উদাঃ ০৫/০৩" 
                           value="{{ sheet.manual_dates[i-1] if sheet.manual_dates and sheet.manual_dates|length >= i else '' }}">
                </div>
                {% endfor %}
                
                <div class="d-grid mt-4 gap-2">
                    <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold shadow">
                        <i class="fas fa-save me-2"></i> তথ্য নিশ্চিত করুন
                    </button>
                    <a href="{{ url_for('view_kisti_sheet', sheet_id=sheet._id|string) }}" class="btn btn-light rounded-pill text-muted border">বাতিল করুন</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
