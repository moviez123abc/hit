{% extends 'base.html' %}

{% block title %}নতুন গ্রাহক যুক্ত করুন | HIT Admin{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card shadow-lg border-0" style="border-radius: 20px;">
                <div class="card-header bg-primary text-white p-4" style="border-radius: 20px 20px 0 0;">
                    <h4 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2"></i> নতুন গ্রাহক বা সদস্য নিবন্ধণ</h4>
                </div>
                
                <form action="/save_customer" method="POST" class="p-4">
                    <div class="row mb-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold text-primary">কালেকশন শিট/দল নির্বাচন করুন <span class="text-danger">*</span></label>
                            <select name="sheet_id" class="form-select form-select-lg border-primary" required>
                                <option value="" disabled selected>তালিকা থেকে একটি দল বেছে নিন...</option>
                                {% for s in sheets %}
                                <option value="{{ s._id|string }}">{{ s.group_name }} ({{ s.code_no }}) - {{ s.village }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <hr class="my-4">

                    <div class="row g-3 mb-4">
                        <h5 class="fw-bold text-secondary"><i class="fas fa-info-circle me-2"></i> প্রাথমিক তথ্য</h5>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">ক্রঃ নং</label>
                            <input type="text" name="sl_no" class="form-control" placeholder="০১">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label small fw-bold">সদস্যের নাম <span class="text-danger">*</span></label>
                            <input type="text" name="customer_name" class="form-control" placeholder="নাম লিখুন" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label small fw-bold">দল ভুক্ত হওয়ার তারিখ</label>
                            <input type="date" name="join_date" class="form-control">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label small fw-bold">হিসাব নং</label>
                            <input type="text" name="acc_no" class="form-control" placeholder="A-101">
                        </div>
                    </div>

                    <div class="row g-3 mb-4 p-3 bg-light rounded-3 border">
                        <h5 class="fw-bold text-secondary"><i class="fas fa-box-open me-2"></i> উপকরণ ও আর্থিক বিবরণ</h5>
                        
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">উপকরণের নাম</label>
                            <input type="text" name="product_name" class="form-control" placeholder="যেমন: সেলাই মেশিন">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">বিতরণের তারিখ</label>
                            <input type="date" name="delivery_date" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">কত মাসে পরিশোধযোগ্য (কিস্তি সংখ্যা)</label>
                            <input type="number" name="total_months" class="form-control" placeholder="যেমন: ১২">
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold">মূল্য (Cost)</label>
                            <input type="number" id="cost_price" name="cost_price" class="form-control" placeholder="0.00">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">মুনাফা (Profit)</label>
                            <input type="number" id="profit" name="profit" class="form-control" placeholder="0.00">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-danger">মোট পাওনা (মুনাফাসহ)</label>
                            <input type="number" id="total_with_profit" name="total_price" class="form-control fw-bold bg-white" readonly>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-primary">গত মাসের নগদ জের (যদি থাকে)</label>
                            <input type="number" name="pre_due_n" class="form-control" placeholder="নগদ বকেয়া">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold text-success">গত মাসের মূল্য আদায় জের (যদি থাকে)</label>
                            <input type="number" name="pre_due_m" class="form-control" placeholder="মূল্য আদায় বকেয়া">
                        </div>
                    </div>

                    <div class="text-end">
                        <a href="/" class="btn btn-light px-4 rounded-pill">বাতিল</a>
                        <button type="submit" class="btn btn-primary px-5 rounded-pill shadow">
                            <i class="fas fa-save me-2"></i> ডাটাবেসে সেভ করুন
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    const costInput = document.getElementById('cost_price');
    const profitInput = document.getElementById('profit');
    const totalInput = document.getElementById('total_with_profit');

    function calculateTotal() {
        const cost = parseFloat(costInput.value) || 0;
        const profit = parseFloat(profitInput.value) || 0;
        totalInput.value = (cost + profit).toFixed(2);
    }

    costInput.addEventListener('input', calculateTotal);
    profitInput.addEventListener('input', calculateTotal);
</script>
{% endblock %}
