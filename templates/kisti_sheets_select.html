{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold text-dark"><i class="fas fa-list-alt me-2 text-primary"></i>কালেকশন শীট নির্বাচন করুন</h3>
    </div>
    
    <div class="row g-3">
        {% for s in sheets %}
        <div class="col-md-4">
            <div class="card h-100 shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-body">
                    <h5 class="fw-bold text-primary">{{ s.group_name }}</h5>
                    <p class="text-muted small mb-3">বার: {{ s.collection_day }} | গ্রাম: {{ s.village }}</p>
                    
                    <div class="d-grid gap-2">
                        <a href="{{ url_for('set_collection_dates', sheet_id=s._id|string) }}" class="btn btn-outline-warning btn-sm rounded-pill">
                            <i class="fas fa-calendar-plus me-1"></i> তারিখ সেট করুন
                        </a>
                        <a href="{{ url_for('view_kisti_sheet', sheet_id=s._id|string) }}" class="btn btn-success btn-sm rounded-pill">
                            <i class="fas fa-money-bill-wave me-1"></i> কালেকশন শুরু করুন
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
